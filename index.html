<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Chek — 1 mês sem açúcar</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <p class="eyebrow">Competição · abril–maio 2026</p>
        <h1>Chek sem açúcar</h1>
        <p class="subtitle">Marque cada dia em que não comeram açúcar. Com Firebase ativo, todos veem as mesmas marcações na hora.</p>
        <p class="sync-status" id="syncStatus" role="status" aria-live="polite"></p>
        <div class="stats" id="stats" aria-live="polite"></div>
      </header>

      <div class="legend" role="group" aria-label="Participantes">
        <span class="legend-item"><span class="dot carlos"></span> Carlos</span>
        <span class="legend-item"><span class="dot amanda"></span> Amanda</span>
        <span class="legend-item"><span class="dot ana"></span> Ana</span>
      </div>

      <main class="days" id="days"></main>

      <footer class="footer">
        <button type="button" class="btn-secondary" id="resetBtn">Limpar tudo</button>
      </footer>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
